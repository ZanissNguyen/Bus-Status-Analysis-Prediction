
services:
  bus_dashboard:
    build: .
    container_name: bus_analytics_app
    ports:
      - "8501:8501"
    volumes:
      # Ánh xạ thư mục hiện tại vào /app trong container. 
      # Sửa code Python ở ngoài thì web tự cập nhật, không cần build lại.
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped